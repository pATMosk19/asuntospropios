name: Deploy con secretos

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar URL del NAS
        env:
          PB_URL: ${{ secrets.PB_URL }}
        run: |
          node -e "
          const fs = require('fs');
          const url = process.env.PB_URL.trim();
          const html = fs.readFileSync('index.html', 'utf8');
          fs.writeFileSync('index.html', html.replace('__PB_URL__', url));
          "

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
